databases:
  - name: smurf-xmd-db
    plan: free
    databaseName: smurf_xmd
    user: smurf_xmd

services:
  - type: web
    name: smurf-xmd
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SESSION_ID
        sync: false
      - key: MODE
        value: public
      - key: TIME_ZONE
        value: Africa/Nairobi
      - key: AUTO_LIKE_STATUS
        value: "true"
      - key: AUTO_READ_STATUS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: smurf-xmd-db
          property: connectionString
